<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虾胡闹，有钳途</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #eef2ff 0%, #f8f9ff 30%, #ffffff 100%);
            min-height: 100vh;
            color: #333;
        }

        /* ===== HEADER ===== */
        .header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 100px; height: 100px;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .logo-icon img {
            width: 100%; height: 100%; object-fit: contain;
        }
        .brand h1 {
            font-size: 18px; font-weight: 700;
            color: #1a1a4e;
        }
        .brand .sub-brand {
            font-size: 11px; color: #999; font-weight: 400;
        }

        .header-right {
            display: flex; align-items: center; gap: 16px;
        }
        .guide-btn {
            background: #eef4ff;
            color: #4D8BFF;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            display: flex; align-items: center; gap: 6px;
        }
        .guide-btn:hover { background: #dde8ff; }
        .user-avatar {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #3A8DFF, #8E54FF);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 14px; font-weight: 700;
            cursor: pointer;
        }

        /* Floating decorative cubes */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 8px;
            opacity: 0.08;
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            width: 80px; height: 80px;
            background: #4D8BFF;
            top: 15%; left: 5%;
            transform: rotate(25deg);
        }
        body::after {
            width: 60px; height: 60px;
            background: #9281FF;
            top: 60%; right: 8%;
            transform: rotate(-15deg);
        }

        /* ===== HERO ===== */
        .hero {
            text-align: center;
            padding: 30px 20px 10px;
            position: relative;
            overflow: visible;
        }
        .hero h2 {
            font-size: 32px; font-weight: 700;
            background: linear-gradient(90deg, #3A8DFF, #1a1a6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }
        .hero p {
            font-size: 15px; color: #666;
        }
        .hero-illustrations {
            display: flex; justify-content: space-between;
            max-width: 900px; margin: 10px auto -10px;
            pointer-events: none;
        }
        .hero-illust {
            width: 160px; height: 130px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .hero-illust-left {
            font-size: 80px;
            filter: drop-shadow(0 8px 20px rgba(77,139,255,0.15));
        }
        .hero-illust-right {
            font-size: 80px;
            filter: drop-shadow(0 8px 20px rgba(146,129,255,0.15));
        }

        /* ===== MAIN CARD ===== */
        .main-card {
            max-width: 900px;
            margin: 20px auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(77,139,255,0.08);
            padding: 30px;
            display: flex;
            gap: 30px;
        }
        .steps-sidebar {
            flex-shrink: 0;
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 0;
            position: relative;
        }
        .step-item {
            display: flex; align-items: flex-start; gap: 14px;
            position: relative;
            padding-bottom: 28px;
        }
        .step-item:last-child { padding-bottom: 0; }
        .step-icon {
            width: 44px; height: 44px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        .step-item:nth-child(1) .step-icon { background: #eef4ff; }
        .step-item:nth-child(2) .step-icon { background: #f0ecff; }
        .step-item:nth-child(3) .step-icon { background: #e6faf0; }
        .step-item:nth-child(1) .step-icon span { color: #4D8BFF; }
        .step-item:nth-child(2) .step-icon span { color: #9281FF; }
        .step-item:nth-child(3) .step-icon span { color: #4DCB9D; }
        .step-text h4 { font-size: 14px; font-weight: 600; color: #333; }
        .step-text p { font-size: 11px; color: #999; margin-top: 2px; }
        /* Dashed line between steps */
        .step-item:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 21px;
            top: 44px;
            width: 2px;
            height: calc(100% - 44px);
            border-left: 2px dashed #dde4f0;
        }

        .upload-area {
            flex: 1;
            border: 2px dashed #c8d6f0;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .upload-title {
            font-size: 16px; font-weight: 600; color: #333;
        }
        .upload-title small {
            font-size: 12px; color: #999; font-weight: 400; display: block; margin-top: 4px;
        }
        .form-row {
            display: flex; gap: 12px;
        }
        .form-group {
            flex: 1; display: flex; flex-direction: column; gap: 4px;
        }
        .form-group label {
            font-size: 12px; color: #666;
        }
        .form-group select,
        .form-group input[type="text"] {
            padding: 10px 14px;
            border: 1.5px solid #dde4f0;
            border-radius: 10px;
            font-size: 14px;
            color: #333;
            background: #f8f9ff;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group select:focus,
        .form-group input[type="text"]:focus {
            border-color: #4D8BFF;
        }
        .dropzone {
            background: #f8f9ff;
            border: 2px dashed #c8d6f0;
            border-radius: 14px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .dropzone:hover, .dropzone.dragover {
            border-color: #4D8BFF;
            background: #eef4ff;
        }
        .dropzone-icon {
            font-size: 40px; margin-bottom: 8px;
        }
        .dropzone-text { font-size: 14px; color: #666; }
        .dropzone-hint { font-size: 12px; color: #999; margin-top: 6px; }
        .upload-btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #3A8DFF 0%, #8E54FF 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .upload-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(77,139,255,0.3);
        }
        .example-link {
            text-align: center;
            font-size: 13px;
            color: #4D8BFF;
            cursor: pointer;
        }
        .example-link:hover { text-decoration: underline; }
        .analyze-btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #e8eaef;
            color: #999;
            font-size: 16px;
            font-weight: 600;
            cursor: not-allowed;
            transition: all 0.3s;
        }
        .analyze-btn.active {
            background: linear-gradient(90deg, #3A8DFF, #8E54FF);
            color: white;
            cursor: pointer;
        }
        .analyze-btn.active:hover {
            box-shadow: 0 6px 20px rgba(77,203,157,0.3);
            transform: translateY(-1px);
        }

        /* ===== FILE PREVIEW ===== */
        .file-preview {
            display: none;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .file-preview.show { display: flex; }
        .file-thumb {
            position: relative;
            width: 80px; height: 80px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .file-thumb img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .file-thumb .remove-btn {
            position: absolute; top: 2px; right: 2px;
            width: 20px; height: 20px;
            background: rgba(0,0,0,0.5);
            color: white; border: none; border-radius: 50%;
            font-size: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* ===== LOADING OVERLAY ===== */
        .loading-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.85);
            z-index: 1000;
            flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px;
        }
        .loading-overlay.show { display: flex; }
        .loader {
            width: 50px; height: 50px;
            border: 4px solid #e0e7ff;
            border-top-color: #4D8BFF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 16px; color: #333; font-weight: 500; }

        /* ===== HISTORY CARD ===== */
        .history-card {
            max-width: 900px;
            margin: 20px auto 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(77,139,255,0.08);
            padding: 24px 30px;
        }
        .history-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }
        .history-header h3 {
            font-size: 16px; font-weight: 600; color: #333;
        }
        .history-count {
            font-size: 13px; color: #999;
        }
        .history-filters {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .filter-tab {
            padding: 6px 16px;
            border: 1.5px solid #dde4f0;
            border-radius: 20px;
            background: white;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-tab.active,
        .filter-tab:hover {
            background: #4D8BFF;
            color: white;
            border-color: #4D8BFF;
        }
        .date-range {
            display: flex; align-items: center; gap: 6px;
            margin-left: auto;
        }
        .date-range input[type="date"] {
            padding: 6px 10px;
            border: 1.5px solid #dde4f0;
            border-radius: 8px;
            font-size: 12px;
            color: #333;
            outline: none;
        }
        .date-range input[type="date"]:focus { border-color: #4D8BFF; }
        .date-range span { color: #999; font-size: 12px; }

        /* History items */
        .history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-item {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .history-item:hover { border-color: #c8d6f0; }
        .history-item.selected { border-color: #4D8BFF; background: #eef4ff; }
        .history-item-header {
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .history-item-info { flex: 1; }
        .history-item-date { font-size: 13px; color: #999; }
        .history-item-name { font-size: 14px; font-weight: 600; color: #333; margin-top: 2px; }
        .history-item-meta {
            display: flex; gap: 12px; margin-top: 6px;
        }
        .error-rate {
            font-size: 12px; font-weight: 600;
            padding: 2px 10px;
            border-radius: 10px;
        }
        .error-rate.high { background: #ffe8e8; color: #e53935; }
        .error-rate.medium { background: #fff3e0; color: #f57c00; }
        .error-rate.low { background: #e6faf0; color: #4DCB9D; }
        .weak-tag {
            font-size: 12px; color: #9281FF;
            background: #f0ecff;
            padding: 2px 10px;
            border-radius: 10px;
        }
        .delete-btn {
            background: none; border: none;
            color: #ccc; font-size: 18px;
            cursor: pointer; padding: 4px;
            transition: color 0.2s;
        }
        .delete-btn:hover { color: #e53935; }

        /* History item expanded */
        .history-detail {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #dde4f0;
            font-size: 13px; color: #555;
            line-height: 1.8;
        }
        .history-item.selected .history-detail { display: block; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        .empty-icon { font-size: 50px; margin-bottom: 12px; }
        .empty-title { font-size: 15px; color: #666; margin-bottom: 4px; }
        .empty-desc { font-size: 13px; }

        /* ===== RESULT MODAL ===== */
        .result-section {
            display: none;
            max-width: 900px;
            margin: 20px auto 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(77,139,255,0.08);
            padding: 30px;
        }
        .result-section.show { display: block; }
        .result-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .result-header h3 {
            font-size: 18px; font-weight: 600;
            background: linear-gradient(135deg, #4D8BFF, #9281FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .close-result {
            background: none; border: none;
            font-size: 24px; color: #999; cursor: pointer;
        }
        .close-result:hover { color: #333; }

        /* ===== SUMMARY CARD ===== */
        .summary-card {
            background: linear-gradient(135deg, #f0f4ff 0%, #f5f0ff 100%);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(77,139,255,0.08);
        }
        .summary-top {
            display: flex; align-items: center; gap: 24px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .error-rate-display {
            text-align: center; min-width: 100px;
        }
        .error-rate-number {
            font-size: 36px; font-weight: 700;
            color: #e53935;
        }
        .error-rate-number.low { color: #4DCB9D; }
        .error-rate-number.medium { color: #f57c00; }
        .error-rate-label {
            font-size: 12px; color: #999; margin-top: 2px;
        }
        .progress-bar-bg {
            width: 120px; height: 8px;
            background: #e0e7ff; border-radius: 4px;
            margin: 6px auto 0; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; border-radius: 4px;
            background: linear-gradient(90deg, #4DCB9D, #f57c00, #e53935);
            transition: width 0.6s ease;
        }
        .summary-weak {
            flex: 1;
        }
        .summary-weak h4 {
            font-size: 13px; color: #666; margin-bottom: 8px;
        }
        .weak-badges {
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .weak-badge {
            padding: 4px 14px; border-radius: 20px;
            font-size: 13px; font-weight: 600;
        }
        .weak-badge.hot {
            background: #ffe8e8; color: #e53935;
        }
        .weak-badge.warm {
            background: #fff3e0; color: #f57c00;
        }
        .weak-badge.cool {
            background: #e6faf0; color: #4DCB9D;
        }
        .summary-eval {
            font-size: 14px; color: #555;
            padding: 12px 16px;
            background: white;
            border-radius: 10px;
            border-left: 4px solid #9281FF;
            line-height: 1.6;
        }

        /* ===== COLLAPSE SECTIONS ===== */
        .detail-section {
            border: 1.5px solid #eef0f5;
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .detail-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 18px;
            cursor: pointer;
            background: #fafbff;
            transition: background 0.2s;
            user-select: none;
        }
        .detail-header:hover { background: #f0f4ff; }
        .detail-header-left {
            display: flex; align-items: center; gap: 10px;
        }
        .detail-header-left .section-icon {
            font-size: 18px;
        }
        .detail-header-left h4 {
            font-size: 14px; font-weight: 600; color: #333;
        }
        .detail-toggle {
            font-size: 12px; color: #999;
            transition: transform 0.2s;
        }
        .detail-section.open .detail-toggle {
            transform: rotate(90deg);
        }
        .detail-body {
            display: none;
            padding: 16px 18px;
            border-top: 1px solid #eef0f5;
        }
        .detail-section.open .detail-body { display: block; }

        /* Error type bars */
        .error-type-row {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 10px;
        }
        .error-type-label {
            width: 80px; font-size: 13px; color: #555; text-align: right;
        }
        .error-type-bar-bg {
            flex: 1; height: 20px; background: #f0f0f0; border-radius: 10px; overflow: hidden;
        }
        .error-type-bar-fill {
            height: 100%; border-radius: 10px; transition: width 0.5s;
        }
        .error-type-count {
            width: 60px; font-size: 13px; color: #555; font-weight: 600;
        }

        /* Wrong question list */
        .wrong-q-item {
            background: #fafbff; border-radius: 10px; padding: 14px;
            margin-bottom: 10px; border-left: 3px solid #e53935;
        }
        .wrong-q-top {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 6px;
        }
        .wrong-q-num {
            font-size: 13px; font-weight: 700; color: #e53935;
        }
        .wrong-q-tag {
            padding: 2px 10px; border-radius: 10px;
            font-size: 11px; font-weight: 600;
            background: #fff3e0; color: #f57c00;
        }
        .wrong-q-reason {
            font-size: 13px; color: #555; margin-bottom: 4px;
        }
        .wrong-q-answer {
            font-size: 12px; color: #4DCB9D; font-weight: 600;
        }

        /* Weak point detail cards */
        .weak-detail-card {
            background: #fafbff; border-radius: 10px; padding: 14px;
            margin-bottom: 10px;
        }
        .weak-detail-name {
            font-size: 14px; font-weight: 700; color: #e53935; margin-bottom: 6px;
        }
        .weak-detail-practice {
            font-size: 13px; color: #555; margin-bottom: 4px;
        }
        .weak-detail-resource {
            font-size: 12px; color: #4D8BFF;
        }

        /* ===== PRACTICE QUESTIONS ===== */
        .practice-section {
            margin-top: 20px;
        }
        .practice-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }
        .practice-header h3 {
            font-size: 16px; font-weight: 600; color: #333;
        }
        .generate-btn {
            padding: 8px 20px; border: none; border-radius: 20px;
            background: linear-gradient(90deg, #3A8DFF, #8E54FF);
            color: white; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .generate-btn:hover {
            transform: translateY(-1px); box-shadow: 0 4px 12px rgba(58,141,255,0.3);
        }
        .generate-btn:disabled {
            opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none;
        }
        .q-card {
            background: #fafbff; border-radius: 12px; padding: 16px;
            margin-bottom: 12px; border: 1.5px solid #eef0f5;
            transition: border-color 0.2s;
        }
        .q-card:hover { border-color: #c8d6f0; }
        .q-top {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .q-num {
            font-size: 13px; font-weight: 700; color: #3A8DFF;
        }
        .q-type {
            padding: 2px 10px; border-radius: 10px;
            font-size: 11px; font-weight: 600;
        }
        .q-type.choice { background: #eef4ff; color: #3A8DFF; }
        .q-type.fill { background: #f0ecff; color: #9281FF; }
        .q-text {
            font-size: 14px; color: #333; line-height: 1.6; margin-bottom: 8px;
        }
        .q-options {
            display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px;
        }
        .q-option {
            font-size: 13px; color: #555; padding: 6px 12px;
            background: white; border-radius: 8px; border: 1px solid #eef0f5;
            cursor: pointer; transition: all 0.2s;
        }
        .q-option:hover { border-color: #3A8DFF; }
        .q-option.selected { border-color: #3A8DFF; background: #eef4ff; }
        .q-option.correct { border-color: #4DCB9D; background: #e6faf0; }
        .q-option.wrong { border-color: #e53935; background: #ffe8e8; }
        .q-answer {
            display: none; font-size: 13px; color: #4DCB9D; font-weight: 600;
            padding: 8px 12px; background: #e6faf0; border-radius: 8px;
            margin-top: 8px;
        }
        .q-answer.show { display: block; }
        .q-hint {
            display: none; font-size: 12px; color: #999; margin-top: 6px;
            padding-left: 12px; border-left: 2px solid #eef0f5;
        }
        .q-hint.show { display: block; }
        .q-actions {
            display: flex; gap: 10px; margin-top: 8px;
        }
        .q-action-btn {

</head>

<script>
// ===== STATE =====
let uploadedFiles = [];
let historyRecords = JSON.parse(localStorage.getItem('xiahunao_history') || '[]');
let currentFilter = 'week';
let selectedRecordId = null;
let pendingDeleteId = null;

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
    renderHistory();
    setupDropzone();
    setupFileInput();
    setupDateFilters();
});

// ===== DROPZONE =====
function setupDropzone() {
    const dz = document.getElementById('dropzone');
    ['dragenter','dragover'].forEach(e => {
        dz.addEventListener(e, ev => { ev.preventDefault(); dz.classList.add('dragover'); });
    });
    ['dragleave','drop'].forEach(e => {
        dz.addEventListener(e, ev => { ev.preventDefault(); dz.classList.remove('dragover'); });
    });
    dz.addEventListener('drop', ev => {
        const files = ev.dataTransfer.files;
        handleFiles(files);
    });
}

function setupFileInput() {
    document.getElementById('fileInput').addEventListener('change', function() {
        handleFiles(this.files);
    });
}

function handleFiles(files) {
    for (let f of files) {
        if (f.size > 10 * 1024 * 1024) {
            alert('文件大小不能超过 10MB');
            continue;
        }
        const reader = new FileReader();
        reader.onload = e => {
            uploadedFiles.push({ name: f.name, data: e.target.result });
            renderFilePreview();
            updateAnalyzeBtn();
        };
        reader.readAsDataURL(f);
    }
}

function renderFilePreview() {
    const container = document.getElementById('filePreview');
    container.innerHTML = '';
    uploadedFiles.forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'file-thumb';
        div.innerHTML = `<img src="${f.data}" alt="${f.name}"><button class="remove-btn" onclick="removeFile(${i})">✕</button>`;
        container.appendChild(div);
    });
    container.classList.toggle('show', uploadedFiles.length > 0);
}

function removeFile(index) {
    uploadedFiles.splice(index, 1);
    renderFilePreview();
    updateAnalyzeBtn();
}

function updateAnalyzeBtn() {
    const btn = document.getElementById('analyzeBtn');
    btn.classList.toggle('active', uploadedFiles.length > 0);
}

// ===== ANALYSIS =====
async function startAnalysis() {
    if (uploadedFiles.length === 0) return;

    const grade = document.getElementById('gradeSelect').value;
    const name = document.getElementById('studentName').value || '同学';

    document.getElementById('loadingOverlay').classList.add('show');
    document.getElementById('loadingText').textContent = 'AI 正在识别错题...';

    try {
        let analysisData;
        try {
            const resp = await fetch('/analyze', {
                method: 'POST',
                body: (() => {
                    const fd = new FormData();
                    fd.append('grade', grade);
                    fd.append('student_name', name);
                    // We need actual files, but we have base64 — try JSON endpoint
                    return fd;
                })()
            });
            if (resp.ok) {
                const json = await resp.json();
                analysisData = parseApiResponse(json, name, grade);
            }
        } catch(e) {}

        if (!analysisData) {
            document.getElementById('loadingText').textContent = 'AI 正在分析薄弱知识点...';
            await new Promise(r => setTimeout(r, 1500));
            document.getElementById('loadingText').textContent = '正在生成学习方案...';
            await new Promise(r => setTimeout(r, 1500));
            analysisData = generateMockData(name, grade);
        }

        // Save to history
        const record = {
            id: Date.now(),
            date: new Date().toISOString(),
            name: name,
            grade: grade,
            errorRate: analysisData.errorRate,
            weakPoint: analysisData.weakPoints[0] || '',
            result: JSON.stringify(analysisData),
            structured: true
        };
        historyRecords.unshift(record);
        localStorage.setItem('xiahunao_history', JSON.stringify(historyRecords));

        // Show result
        currentAnalysisData = analysisData;
        renderAnalysisResult(analysisData);
        document.getElementById('resultSection').classList.add('show');
        document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });

        // Reset upload
        uploadedFiles = [];
        renderFilePreview();
        updateAnalyzeBtn();
        renderHistory();
    } catch(e) {
        alert('分析出错：' + e.message);
    } finally {
        document.getElementById('loadingOverlay').classList.remove('show');
    }
}

function generateMockData(name, grade) {
    return {
        studentName: name,
        grade: grade,
        errorRate: 38,
        weakPoints: ['小数乘法运算', '面积单位换算', '分数化简'],
        evaluation: '计算能力偏弱，建议加强基础运算训练，尤其是小数乘法与进位规则。',
        errorTypes: [
            { name: '粗心大意', count: 2, percent: 33, color: '#FFB74D' },
            { name: '概念不清', count: 1, percent: 17, color: '#FF7043' },
            { name: '方法不会', count: 3, count: 3, percent: 50, color: '#E53935' }
        ],
        wrongQuestions: [
            { num: 1, reason: '小数点位置错误，未掌握小数乘法对齐规则', correctAnswer: '3.75', tag: '小数乘法' },
            { num: 2, reason: '面积单位换算时，1m²=100dm² 记成 1000', correctAnswer: '850dm²', tag: '面积换算' },
            { num: 3, reason: '分数化简未约分到最简', correctAnswer: '2/3', tag: '分数化简' },
            { num: 4, reason: '进位加法遗漏进位', correctAnswer: '1.56', tag: '小数乘法' },
            { num: 5, reason: '将平方米记成平方分米', correctAnswer: '3.5m²', tag: '面积换算' },
            { num: 6, reason: '未找到分子分母的最大公约数', correctAnswer: '5/8', tag: '分数化简' }
        ],
        weakDetails: [
            { name: '小数乘法运算', practice: '每天 10 道小数乘法专项练习，重点练小数点定位与进位规则', resource: '《五年级数学下册》第3单元练习' },
            { name: '面积单位换算', practice: '用面积模型理解 m²/dm²/cm² 的换算关系，自制换算卡片', resource: '面积单位换算动画课（可汗学院）' },
            { name: '分数化简', practice: '练习找最大公约数（GCD），用短除法化简分数', resource: '《分数运算专项训练》第2章' }
        ]
    };
}

function parseApiResponse(json, name, grade) {
    // Try to parse API response into structured data
    try {
        const wp = json.weak_points || [];
        const wq = json.wrong_questions || [];
        const et = json.error_types || [];
        const rec = json.recommendations || [];
        const errorRate = wq.length > 0 ? Math.floor((wq.length / (wq.length + 3)) * 100) : 30;
        return {
            studentName: name,
            grade: grade,
            errorRate: errorRate,
            weakPoints: wp.length ? wp.slice(0,3) : ['未识别'],
            evaluation: json.root_cause || '请查看下方详细分析',
            errorTypes: et.map((e, i) => ({
                name: e, count: Math.ceil(wq.length / et.length), percent: Math.floor(100/et.length), color: ['#FFB74D','#FF7043','#E53935'][i%3]
            })),
            wrongQuestions: wq.map((q, i) => ({
                num: i+1, reason: q.error_type + ': ' + q.question, correctAnswer: q.correct_answer || '见解析', tag: q.error_type
            })),
            weakDetails: wp.map(w => ({ name: w, practice: rec.length ? rec.shift() : '针对性练习', resource: '教材相关章节' }))
        };
    } catch(e) {
        return null;
    }
}

function renderAnalysisResult(data) {
    // Summary card
    const rateClass = data.errorRate >= 40 ? '' : data.errorRate >= 20 ? 'medium' : 'low';
    const rateColorClass = data.errorRate >= 40 ? '' : data.errorRate >= 20 ? 'medium' : 'low';
    const badgeClasses = ['hot', 'warm', 'cool'];

    document.getElementById('summaryCard').innerHTML = `
        <div class="summary-top">
            <div class="error-rate-display">
                <div class="error-rate-number ${rateColorClass}">${data.errorRate}%</div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${data.errorRate}%"></div></div>
                <div class="error-rate-label">总错误率</div>
            </div>
            <div class="summary-weak">
                <h4>🏷️ 薄弱知识点 TOP ${data.weakPoints.length}</h4>
                <div class="weak-badges">
                    ${data.weakPoints.map((w, i) => `<span class="weak-badge ${badgeClasses[i] || 'warm'}">${w}</span>`).join('')}
                </div>
            </div>
        </div>
        <div class="summary-eval">💡 ${data.evaluation}</div>
    `;

    // Detail sections
    document.getElementById('detailSections').innerHTML = `
        <!-- Section A: Error Type Distribution -->
        <div class="detail-section" id="sectionA">
            <div class="detail-header" onclick="toggleSection('sectionA')">
                <div class="detail-header-left">
                    <span class="section-icon">📊</span>
                    <h4>错误类型分布</h4>
                </div>
                <span class="detail-toggle">▶</span>
            </div>
            <div class="detail-body">
                ${data.errorTypes.map(et => `
                    <div class="error-type-row">
                        <div class="error-type-label">${et.name}</div>
                        <div class="error-type-bar-bg">
                            <div class="error-type-bar-fill" style="width:${et.percent}%;background:${et.color}"></div>
                        </div>
                        <div class="error-type-count">${et.count}题 (${et.percent}%)</div>
                    </div>
                `).join('')}
            </div>
        </div>

        <!-- Section B: Wrong Questions -->
        <div class="detail-section" id="sectionB">
            <div class="detail-header" onclick="toggleSection('sectionB')">
                <div class="detail-header-left">
                    <span class="section-icon">❌</span>
                    <h4>错题列表（共 ${data.wrongQuestions.length} 题）</h4>
                </div>
                <span class="detail-toggle">▶</span>
            </div>
            <div class="detail-body">
                ${data.wrongQuestions.map(q => `
                    <div class="wrong-q-item">
                        <div class="wrong-q-top">
                            <span class="wrong-q-num">第 ${q.num} 题</span>
                            <span class="wrong-q-tag">${q.tag}</span>
                        </div>
                        <div class="wrong-q-reason">原因：${q.reason}</div>
                        <div class="wrong-q-answer">✅ 正确答案：${q.correctAnswer}</div>
                    </div>
                `).join('')}
            </div>
        </div>

        <!-- Section C: Weak Point Details -->
        <div class="detail-section" id="sectionC">
            <div class="detail-header" onclick="toggleSection('sectionC')">
                <div class="detail-header-left">
                    <span class="section-icon">🎯</span>
                    <h4>薄弱知识点详解</h4>
                </div>
                <span class="detail-toggle">▶</span>
            </div>
            <div class="detail-body">
                ${data.weakDetails.map(w => `
                    <div class="weak-detail-card">
                        <div class="weak-detail-name">🔴 ${w.name}</div>
                        <div class="weak-detail-practice">📝 练习方向：${w.practice}</div>
                        <div class="weak-detail-resource">📖 推荐资源：${w.resource}</div>
                    </div>
                `).join('')}
            </div>
        </div>
    `;
}

function toggleSection(id) {
    document.getElementById(id).classList.toggle('open');
}

function closeResult() {
    document.getElementById('resultSection').classList.remove('show');
}

// ===== PRACTICE QUESTIONS =====
let currentAnalysisData = null;

async function generatePractice() {
    if (!currentAnalysisData) return;
    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.textContent = '⏳ 生成中...';

    let questions;
    try {
        const resp = await fetch('/generate-practice', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ weak_points: currentAnalysisData.weakPoints })
        });
        if (resp.ok) {
            questions = await resp.json();
        }
    } catch(e) {}

    if (!questions || !questions.length) {
        // Mock practice questions
        await new Promise(r => setTimeout(r, 1500));
        questions = [
            { id: 1, type: '选择题', question: '计算 3.6 × 0.25 的结果是多少？', options: ['0.9', '0.8', '0.7', '0.6'], answer: 'A', hint: '先算 36×25=900，再确定小数位数（2+2=4位），所以 0.0900=0.9' },
            { id: 2, type: '选择题', question: '下列哪个面积换算正确？', options: ['1m²=100dm²', '1m²=1000dm²', '1dm²=100m²', '1m²=10dm²'], answer: 'A', hint: '1m=10dm，所以 1m²=10×10=100dm²' },
            { id: 3, type: '填空题', question: '将分数 12/18 化为最简分数：____', options: null, answer: '2/3', hint: '12和18的最大公约数是6，12÷6=2，18÷6=3' },
            { id: 4, type: '填空题', question: '计算 2.4 × 1.5 = ____', options: null, answer: '3.6', hint: '24×15=360，小数位数1+1=2位，所以 3.60=3.6' },
            { id: 5, type: '选择题', question: '一个房间长5m、宽3m，面积是多少平方分米？', options: ['150dm²', '15dm²', '1500dm²', '1.5dm²'], answer: 'C', hint: '5m×3m=15m²，15×100=1500dm²' }
        ];
    }

    renderPracticeQuestions(questions);
    btn.disabled = false;
    btn.textContent = '🎯 重新生成';
}

function renderPracticeQuestions(questions) {
    const container = document.getElementById('practiceList');
    container.innerHTML = questions.map((q, i) => {
        const typeClass = q.type === '选择题' ? 'choice' : 'fill';
        const optionsHtml = q.options ? `
            <div class="q-options" id="q-opts-${i}">
                ${q.options.map((opt, j) => {
                    const label = String.fromCharCode(65 + j);
                    return `<div class="q-option" data-idx="${j}" onclick="checkAnswer(${i}, '${q.answer}', ${j}, '${label}')">${label}. ${opt}</div>`;
                }).join('')}
            </div>` : `
            <div class="q-actions">
                <input type="text" id="fill-input-${i}" placeholder="请输入答案" style="padding:6px 12px;border:1px solid #dde4f0;border-radius:8px;font-size:13px;width:200px">
                <button class="q-action-btn" onclick="checkFillAnswer(${i}, '${q.answer}')">确认</button>
            </div>`;
        return `
            <div class="q-card" id="q-card-${i}">
                <div class="q-top">
                    <span class="q-num">第 ${i+1} 题</span>
                    <span class="q-type ${typeClass}">${q.type}</span>
                </div>
                <div class="q-text">${q.question}</div>
                ${optionsHtml}
                <div class="q-answer" id="q-answer-${i}">✅ 正确答案：${q.answer}</div>
                <div class="q-hint" id="q-hint-${i}">💡 提示：${q.hint}</div>
                <div class="q-actions">
                    <button class="q-action-btn" onclick="showHint(${i})">查看提示</button>
                    <button class="q-action-btn" onclick="showAnswer(${i})">查看答案</button>
                </div>
            </div>`;
    }).join('');
}

function checkAnswer(qIdx, correct, selectedIdx, selectedLabel) {
    const opts = document.querySelectorAll(`#q-opts-${qIdx} .q-option`);
    const correctIdx = correct.charCodeAt(0) - 65;
    opts.forEach((opt, i) => {
        opt.style.pointerEvents = 'none';
        if (i === correctIdx) opt.classList.add('correct');
        if (i === selectedIdx && i !== correctIdx) opt.classList.add('wrong');
    });
}

function checkFillAnswer(qIdx, correct) {
    const input = document.getElementById(`fill-input-${qIdx}`);
    const answerDiv = document.getElementById(`q-answer-${qIdx}`);
    if (input.value.trim() === correct) {
        input.style.borderColor = '#4DCB9D';
        input.style.background = '#e6faf0';
    } else {
        input.style.borderColor = '#e53935';
        input.style.background = '#ffe8e8';
    }
    answerDiv.classList.add('show');
}

function showHint(idx) {
    document.getElementById(`q-hint-${idx}`).classList.toggle('show');
}

function showAnswer(idx) {
    document.getElementById(`q-answer-${idx}`).classList.add('show');
}

// ===== HISTORY =====
function getFilteredRecords() {
    const now = new Date();
    let filtered = [...historyRecords];

    if (currentFilter === 'week') {
        const weekAgo = new Date(now - 7 * 86400000);
        filtered = filtered.filter(r => new Date(r.date) >= weekAgo);
    } else if (currentFilter === 'month') {
        const monthAgo = new Date(now - 30 * 86400000);
        filtered = filtered.filter(r => new Date(r.date) >= monthAgo);
    }

    // Custom date range
    const from = document.getElementById('dateFrom').value;
    const to = document.getElementById('dateTo').value;
    if (from) {
        filtered = filtered.filter(r => new Date(r.date) >= new Date(from));
    }
    if (to) {
        const toDate = new Date(to);
        toDate.setHours(23, 59, 59);
        filtered = filtered.filter(r => new Date(r.date) <= toDate);
    }

    return filtered;
}

function renderHistory() {
    const list = document.getElementById('historyList');
    const records = getFilteredRecords();
    document.getElementById('historyCount').textContent = `共 ${records.length} 条记录`;

    if (records.length === 0) {
        list.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">📋🔍</div>
                <div class="empty-title">暂无历史记录</div>
                <div class="empty-desc">上传试卷并完成分析后, 记录将显示在这里</div>
            </div>`;
        return;
    }

    list.innerHTML = '<div class="history-list">' + records.map((r, i) => {
        const rateClass = r.errorRate >= 40 ? 'high' : r.errorRate >= 20 ? 'medium' : 'low';
        const sel = r.id === selectedRecordId ? 'selected' : '';
        const dateStr = new Date(r.date).toLocaleDateString('zh-CN');
        return `
            <div class="history-item ${sel}" onclick="toggleRecord(${r.id})">
                <div class="history-item-header">
                    <div class="history-item-info">
                        <div class="history-item-date">${dateStr}</div>
                        <div class="history-item-name">${r.name}（${r.grade}）</div>
                        <div class="history-item-meta">
                            <span class="error-rate ${rateClass}">错误率 ${r.errorRate}%</span>
                            <span class="weak-tag">薄弱: ${r.weakPoint}</span>
                        </div>
                    </div>
                    <button class="delete-btn" onclick="event.stopPropagation(); askDelete(${r.id})">🗑️</button>
                </div>
                <div class="history-detail">${r.result}</div>
            </div>`;
    }).join('') + '</div>';
}

function toggleRecord(id) {
    selectedRecordId = selectedRecordId === id ? null : id;
    renderHistory();
}

function filterHistory(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderHistory();
}

function setupDateFilters() {
    document.getElementById('dateFrom').addEventListener('change', renderHistory);
    document.getElementById('dateTo').addEventListener('change', renderHistory);
}

// ===== DELETE =====
function askDelete(id) {
    pendingDeleteId = id;
    document.getElementById('confirmDialog').classList.add('show');
}

function closeConfirm() {
    pendingDeleteId = null;
    document.getElementById('confirmDialog').classList.remove('show');
}

function confirmAction() {
    if (pendingDeleteId) {
        historyRecords = historyRecords.filter(r => r.id !== pendingDeleteId);
        localStorage.setItem('xiahunao_history', JSON.stringify(historyRecords));
        if (selectedRecordId === pendingDeleteId) selectedRecordId = null;
        pendingDeleteId = null;
        document.getElementById('confirmDialog').classList.remove('show');
        renderHistory();
    }
}
