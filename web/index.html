<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI教育平台 MVP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header p { opacity: 0.9; }
        .content { padding: 30px; }
        .upload-section {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s;
            background: #fafafa;
        }
        .upload-section:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .upload-section.dragover {
            border-color: #667eea;
            background: #e8eeff;
        }
        input[type="text"] {
            width: 100%;
            max-width: 300px;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        input[type="file"] {
            display: none;
        }
        .file-label {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
        }
        .file-label:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        .btn-primary {
            padding: 14px 40px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            padding: 10px 24px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .btn-sm {
            padding: 6px 16px;
            font-size: 13px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-detail {
            background: #667eea;
            color: white;
        }
        .btn-detail:hover { background: #5568d3; }
        .btn-delete {
            background: #ff6b6b;
            color: white;
            margin-left: 8px;
        }
        .btn-delete:hover { background: #e55a5a; }
        .result-box {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            display: none;
        }
        .result-box.show { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-box h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 20px;
        }
        .weak-points {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }
        .tag {
            background: #ff6b6b;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
        }
        .recommendations {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
        }
        .recommendations li {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            list-style-position: inside;
        }
        .recommendations li:last-child { border-bottom: none; }
        .exam-list {
            margin-top: 40px;
        }
        .exam-list h3 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        .exam-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .exam-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        .exam-info { flex: 1; }
        .exam-info h4 { color: #333; margin-bottom: 5px; }
        .exam-info p { color: #666; font-size: 14px; }
        .exam-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .exam-status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
        }
        .status-analyzed { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loading.show { display: block; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .practice-section {
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, #fff9e6 0%, #ffe4b5 100%);
            border-radius: 12px;
            display: none;
        }
        .practice-section.show { display: block; animation: fadeIn 0.5s; }
        .practice-section h3 {
            color: #e67e22;
            margin-bottom: 20px;
        }
        .question-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .question-type {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }
        .question-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        .options {
            margin: 10px 0;
        }
        .option-item {
            padding: 10px 15px;
            margin: 8px 0;
            background: #f8f9fa;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option-item:hover {
            background: #e9ecef;
        }
        .hint-box {
            margin-top: 15px;
            padding: 12px;
            background: #e8f4f8;
            border-left: 4px solid #3498db;
            border-radius: 4px;
            display: none;
        }
        .hint-box.show { display: block; }
        .show-answer-btn {
            padding: 8px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .answer-text {
            margin-top: 10px;
            padding: 10px;
            background: #d4edda;
            border-radius: 6px;
            color: #155724;
            display: none;
        }
        .answer-text.show { display: block; }
        .root-cause {
            margin-top: 15px;
            padding: 15px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            border-radius: 4px;
            color: #856404;
        }
        .error-types {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .error-tag {
            background: #e3f2fd;
            color: #1565c0;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 AI教育平台 MVP</h1>
            <p>上传试卷 → AI分析薄弱点 → 获取个性化学习方案</p>
        </div>
        
        <div class="content">
            <!-- 上传区域 -->
            <div class="upload-section" id="dropZone">
                <h3 style="margin-bottom: 20px; color: #555;">📤 上传学生试卷</h3>
                <input type="text" id="studentName" placeholder="请输入学生姓名" />
                <br>
                <input type="file" id="fileInput" accept="image/*" />
                <label for="fileInput" class="file-label">📷 选择试卷图片</label>
                <p id="fileName" style="margin-top: 10px; color: #666;"></p>
                <button class="btn-primary" id="uploadBtn" onclick="uploadAndAnalyze()" disabled>
                    开始分析
                </button>
            </div>
            
            <!-- 加载中 -->
            <div class="loading" id="loadingBox">
                <div class="spinner"></div>
                <p>正在上传并分析试卷...</p>
                <p style="font-size: 14px; color: #999; margin-top: 10px;">预计需要 10-20 秒</p>
            </div>
            
            <!-- 分析结果 -->
            <div class="result-box" id="resultBox">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>📊 AI分析结果</h3>
                    <button class="btn-secondary" onclick="hideResult()">✕ 关闭</button>
                </div>
                <p><strong>学生：</strong><span id="resultStudent"></span></p>
                <p style="margin-top:5px;color:#999;font-size:13px;" id="resultTime"></p>
                
                <div style="margin-top: 15px;">
                    <strong>错误类型：</strong>
                    <div class="error-types" id="errorTypes"></div>
                </div>
                <div style="margin-top: 15px;">
                    <strong>薄弱知识点：</strong>
                    <div class="weak-points" id="weakPoints"></div>
                </div>
                <div class="root-cause" id="rootCause"></div>
                <div class="recommendations">
                    <strong>💡 针对性强化建议：</strong>
                    <ol id="recommendations"></ol>
                </div>
                <button class="btn-primary" id="generateBtn" onclick="generatePractice()" style="margin-top: 20px;">
                    📝 生成5道巩固练习题
                </button>
                <button class="btn-primary" id="exportPdfBtn" onclick="exportPdf()" style="margin-top: 20px; margin-left: 10px; background: linear-gradient(90deg, #e67e22 0%, #d35400 100%); display: none;">
                    📄 导出PDF
                </button>
            </div>
            
            <!-- 巩固练习题 -->
            <div class="practice-section" id="practiceBox">
                <h3>📝 针对性巩固练习（5道题）</h3>
                <div id="questionsList"></div>
            </div>
            
            <!-- 试卷列表 -->
            <div class="exam-list">
                <h3>📋 历史分析记录</h3>
                <div id="examList">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '';
        let selectedFile = null;
        let currentExamId = null;
        
        // 文件选择
        document.getElementById('fileInput').addEventListener('change', function(e) {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                document.getElementById('fileName').textContent = '已选择: ' + selectedFile.name;
                document.getElementById('uploadBtn').disabled = false;
            }
        });
        
        // 拖拽上传
        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            selectedFile = e.dataTransfer.files[0];
            if (selectedFile && selectedFile.type.startsWith('image/')) {
                document.getElementById('fileName').textContent = '已选择: ' + selectedFile.name;
                document.getElementById('uploadBtn').disabled = false;
            }
        });
        
        // 上传并分析
        async function uploadAndAnalyze() {
            const studentName = document.getElementById('studentName').value.trim();
            if (!studentName) {
                alert('请输入学生姓名');
                return;
            }
            if (!selectedFile) {
                alert('请选择试卷图片');
                return;
            }
            
            document.getElementById('loadingBox').classList.add('show');
            document.getElementById('resultBox').classList.remove('show');
            document.getElementById('practiceBox').classList.remove('show');
            document.getElementById('uploadBtn').disabled = true;
            
            try {
                const formData = new FormData();
                formData.append('student_name', studentName);
                formData.append('file', selectedFile);
                
                const uploadRes = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const uploadData = await uploadRes.json();
                
                if (!uploadData.success) {
                    throw new Error(uploadData.error || '上传失败');
                }
                
                const analyzeRes = await fetch(`${API_URL}/analyze/${uploadData.id}`, {
                    method: 'POST'
                });
                const analyzeData = await analyzeRes.json();
                
                if (!analyzeData.success) {
                    throw new Error(analyzeData.error || '分析失败');
                }
                
                currentExamId = uploadData.id;
                displayResult(studentName, analyzeData.analysis, new Date().toLocaleString());
                loadExamList();
                
                document.getElementById('studentName').value = '';
                document.getElementById('fileName').textContent = '';
                document.getElementById('fileInput').value = '';
                selectedFile = null;
                document.getElementById('uploadBtn').disabled = true;
                
            } catch (error) {
                alert('操作失败: ' + error.message);
            } finally {
                document.getElementById('loadingBox').classList.remove('show');
            }
        }
        
        // 显示分析结果
        function displayResult(student, analysis, timeStr) {
            document.getElementById('resultStudent').textContent = student;
            document.getElementById('resultTime').textContent = timeStr || '';
            
            // 错误类型
            const errorTypes = analysis.error_types || [];
            document.getElementById('errorTypes').innerHTML = errorTypes.map(t => 
                `<span class="error-tag">${t}</span>`
            ).join('');
            
            // 薄弱知识点
            const weakPoints = analysis.weak_points || [];
            document.getElementById('weakPoints').innerHTML = weakPoints.map(p => 
                `<span class="tag">${p}</span>`
            ).join('');
            
            // 根本原因
            const rootCause = analysis.root_cause || '';
            document.getElementById('rootCause').innerHTML = rootCause ? 
                `<strong>🔍 根本原因：</strong>${rootCause}` : '';
            
            // 建议
            const recs = analysis.recommendations || [];
            document.getElementById('recommendations').innerHTML = recs.map(r => 
                `<li>${r}</li>`
            ).join('');
            
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
        }
        
        // 关闭结果
        function hideResult() {
            document.getElementById('resultBox').classList.remove('show');
            document.getElementById('practiceBox').classList.remove('show');
        }
        
        // 查看历史分析详情
        async function viewExamDetail(examId) {
            try {
                const res = await fetch(`${API_URL}/exams/${examId}`);
                const data = await res.json();
                
                if (data.error) {
                    // 未分析，先触发分析
                    const analyzeRes = await fetch(`${API_URL}/analyze/${examId}`, { method: 'POST' });
                    const analyzeData = await analyzeRes.json();
                    if (analyzeData.success) {
                        currentExamId = examId;
                        displayResult(data.student || '未知', analyzeData.analysis, 
                            data.created ? new Date(data.created).toLocaleString() : '');
                        loadExamList();
                    }
                    return;
                }
                
                currentExamId = examId;
                const analysis = data.ai_analysis || {};
                const timeStr = data.created ? new Date(data.created).toLocaleString() : '';
                displayResult(data.student || '未知', analysis, timeStr);
            } catch (error) {
                alert('加载失败: ' + error.message);
            }
        }
        
        // 删除记录
        async function deleteExam(examId, event) {
            event.stopPropagation();
            if (!confirm('确定删除这条记录吗？')) return;
            
            try {
                await fetch(`${API_URL}/exams/${examId}`, { method: 'DELETE' });
                loadExamList();
            } catch (error) {
                alert('删除失败');
            }
        }
        
        // 加载试卷列表
        async function loadExamList() {
            try {
                const res = await fetch(`${API_URL}/exams`);
                const data = await res.json();
                
                const listHtml = data.exams.length > 0 
                    ? data.exams.map(e => `
                        <div class="exam-item" onclick="viewExamDetail(${e.id})">
                            <div class="exam-info">
                                <h4>${e.student}</h4>
                                <p>${e.created ? new Date(e.created).toLocaleString() : ''}</p>
                            </div>
                            <div class="exam-actions">
                                <span class="exam-status ${e.weak_points ? 'status-analyzed' : 'status-pending'}">
                                    ${e.weak_points ? '✅ 已分析' : '⏳ 待分析'}
                                </span>
                                <button class="btn-sm btn-detail" onclick="viewExamDetail(${e.id})">查看</button>
                                <button class="btn-sm btn-delete" onclick="deleteExam(${e.id}, event)">删除</button>
                            </div>
                        </div>
                    `).join('')
                    : '<div class="empty-state">暂无数据，请先上传试卷</div>';
                
                document.getElementById('examList').innerHTML = listHtml;
            } catch (error) {
                document.getElementById('examList').innerHTML = 
                    '<div class="empty-state">加载失败，请刷新重试</div>';
            }
        }
        
        // 导出 PDF
        async function exportPdf() {
            if (!currentExamId) {
                alert('请先上传并分析试卷');
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/export-practice-pdf/${currentExamId}`, {
                    method: 'POST'
                });
                
                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || '导出失败');
                }
                
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `practice_${currentExamId}.pdf`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                alert('导出PDF失败: ' + error.message);
            }
        }

        // 生成巩固练习题
        async function generatePractice() {
            if (!currentExamId) {
                alert('请先上传并分析试卷');
                return;
            }
            
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = '⏳ AI出题中...';
            
            try {
                const res = await fetch(`${API_URL}/generate-practice/${currentExamId}`, {
                    method: 'POST'
                });
                const data = await res.json();
                
                if (!data.success) {
                    throw new Error(data.error || '生成失败');
                }
                
                displayQuestions(data.questions);
                document.getElementById('exportPdfBtn').style.display = 'inline-block';
                
            } catch (error) {
                alert('生成练习题失败: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '📝 重新生成5道巩固练习题';
            }
        }
        
        // 显示练习题
        function displayQuestions(questions) {
            const container = document.getElementById('questionsList');
            
            const html = questions.map((q, index) => `
                <div class="question-card">
                    <div class="question-header">
                        <span style="font-weight: bold; color: #333;">第 ${index + 1} 题</span>
                        <span class="question-type">${q.type}</span>
                    </div>
                    <div class="question-text">${q.question}</div>
                    ${q.options ? `
                        <div class="options">
                            ${q.options.map((opt, i) => `
                                <div class="option-item" onclick="selectOption(this)">${String.fromCharCode(65 + i)}. ${opt}</div>
                            `).join('')}
                        </div>
                    ` : ''}
                    <button class="show-answer-btn" onclick="toggleAnswer(${index})">💡 查看提示/答案</button>
                    <div class="hint-box" id="hint-${index}">
                        <strong>提示：</strong>${q.hint}
                        <div class="answer-text" id="answer-${index}">
                            <strong>答案：</strong>${q.answer}
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = html;
            document.getElementById('practiceBox').classList.add('show');
            document.getElementById('practiceBox').scrollIntoView({ behavior: 'smooth' });
        }
        
        // 选择选项（视觉反馈）
        function selectOption(element) {
            const siblings = element.parentElement.querySelectorAll('.option-item');
            siblings.forEach(s => s.style.background = '#f8f9fa');
            element.style.background = '#d4edda';
        }
        
        // 切换答案显示
        function toggleAnswer(index) {
            const hintBox = document.getElementById(`hint-${index}`);
            const answerText = document.getElementById(`answer-${index}`);
            hintBox.classList.toggle('show');
            setTimeout(() => {
                answerText.classList.toggle('show');
            }, 500);
        }

        // 页面加载时获取列表
        loadExamList();
    </script>
</body>
</html>
